---
name: health-data-pipeline
prefect-version: 3.6.27

build: null
push: null

pull:
- prefect.deployments.steps.git_clone:
    repository: https://github.com/DarvinSures/health-data-pipeline.git
    branch: main
    access_token: "your_token_here"
- prefect.deployments.steps.run_shell_script:
    script: pip install -r health-data-pipeline-main/requirements.txt
    stream_output: true

deployments:
- name: health-pipeline-deployment
  version: null
  tags: []
  description: "Weekly health data pipeline - Google Sheet to FHIR"
  entrypoint: orchestration/pipeline_flow.py:health_pipeline
  parameters: {}
  schedules:
  - cron: "0 6 * * 1"
    timezone: UTC
    active: true
  work_pool:
    name: default-agent-pool
    work_queue_name: null
    job_variables: {}